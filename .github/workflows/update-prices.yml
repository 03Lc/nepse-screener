name: Update NEPSE prices

on:
  schedule:
    # NEPSE trades ~11:00-15:00 NPT (UTC+5:45), Sun-Thu.
    # Runs every 15 min from 05:00-09:30 UTC (10:45-15:15 NPT) on Sun-Thu.
    - cron: "0,15,30,45 5-9 * * 0,1,2,3,4"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper
        run: python scrape_prices.py

      - name: Commit updated prices.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json
          git diff --quiet --cached || git commit -m "Update NEPSE prices $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
